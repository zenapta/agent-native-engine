services:
  # 1. Database Layer (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache & Message Broker Layer (Redis)
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Core Go State Machine
  orchestrator:
    build: ./orchestrator
    container_name: agent-orchestrator
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=agent_engine
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Node API Gateway (Exposing Port 8080)
  gateway:
    build:
      context: ./gateway
    container_name: agent-gateway
    ports:
      - "8080:8080"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:50051
      - REDIS_HOST=redis
      - NODE_ENV=development
    depends_on:
      - orchestrator

  # 5. Next.js Frontend Dashboard (Exposing Port 3000)
  agent-ui:
    build:
      context: ./agent-ui
    container_name: agent-ui-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ./agent-ui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - gateway

  # 6. Python Async Workers
  worker:
    build:
      context: ./workers
    container_name: agent-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata: